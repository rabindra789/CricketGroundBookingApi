name: Deploy Cricket API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to KVM Server
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /var/www/CricketGroundBookingApi

            git pull origin main

            docker stop cricket-api || true
            docker rm cricket-api || true

            docker build -t cricket-api .

            docker run -d \
              --name cricket-api \
              --restart unless-stopped \
              -p 5107:5107 \
              cricket-api