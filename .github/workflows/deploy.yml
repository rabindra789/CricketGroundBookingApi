name: Deploy Cricket API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH reachability
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          nc -vz -w 10 "$SERVER_HOST" 22

      - name: Deploy to KVM Server
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 90s
          command_timeout: 10m
          script_stop: true

          script: |
            set -e

            cd /var/www/CricketGroundBookingApi

            git pull --ff-only origin main

            docker rm -f cricket-api || true
            docker network inspect cricket-network >/dev/null 2>&1 || docker network create cricket-network

            docker build -t cricket-api .

            docker run -d \
              --name cricket-api \
              --network cricket-network \
              --restart unless-stopped \
              -p 5107:5107 \
              -e DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}" \
              cricket-api
